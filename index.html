<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animation behavior for the floating labels */
        .text-field input:focus ~ label,
        .text-field input:valid ~ label {
            top: -5px;
            font-size: 14px;
            color: #2691d9;
        }
        /* Custom animation for the bottom border line */
        .text-field input:focus ~ span::before,
        .text-field input:valid ~ span::before {
            width: 100%;
        }
    </style>
</head>
<body class="margin-0 padding-0 font-serif bg-gradient-to-r from-[#2980b9] to-[#8e44ad] h-screen overflow-hidden flex items-center justify-center">

<div class="w-full max-w-[400px] mx-4 bg-white rounded-[10px] shadow-xl p-10 box-border">        <h1 class="text-center text-3xl font-bold pb-5 border-b border-gray-300 mb-8">
            Login
        </h1>
        
        <form method="post" class="space-y-8">
            <div class="text-field relative border-b-2 border-[#adadad] my-7">
                <input type="text" required class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800">
                <span class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"></span>
                <label class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500">Username</label>
            </div>
            
            <div class="text-field relative border-b-2 border-[#adadad] my-7">
                <input type="password" required class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800">
                <span class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"></span>
                <label class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500">Password</label>
            </div>
            
            <div class="text-[#a6a6a6] cursor-pointer hover:underline text-sm -mt-4 ml-1">
                Forgot Password?
            </div>
            
            <input type="submit" value="Login" class="w-full h-[50px] bg-[#2691d9] text-[#e9f4fb] rounded-[20px] text-lg font-bold cursor-pointer outline-none border border-transparent hover:border-[#2691d9] transition-all duration-500">
            
            <div class="mt-8 text-center text-base text-[#666666]">
                Not a member? <a href="#" class="text-[#2691d9] no-underline hover:underline">Sign Up</a>
            </div>
        </form>
    </div>

</body>
</html>
