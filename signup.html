<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom animation behavior for the floating labels */
      .text-field input:focus ~ label,
      .text-field input:not(:placeholder-shown) ~ label {
        top: -5px;
        font-size: 14px;
        color: #2691d9;
      }
      /* Custom animation for the bottom border line */
      .text-field input:focus ~ span::before,
      .text-field input:not(:placeholder-shown) ~ span::before {
        width: 100%;
      }
    </style>
  </head>
  <body
    class="margin-0 padding-0 font-serif bg-gradient-to-r from-[#2980b9] to-[#8e44ad] h-screen overflow-hidden flex items-center justify-center p-4"
  >
    <div
      class="w-full max-w-[400px] bg-white rounded-[10px] shadow-xl p-5 box-border"
    >
      <h1
        class="text-center text-3xl font-bold pb-5 border-b border-gray-300 mb-8"
      >
        Sign up
      </h1>

      <form id="signupForm" method="" class="space-y-8">
        <div class="text-field relative border-b-2 border-[#adadad] my-7">
          <input
            type="text"
            id="firstName"
            name="firstName"
            placeholder=""
            class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800"
          />
          <span
            class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"
          ></span>
          <label
            class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500"
            >FirstName</label
          >
        </div>

        <div class="text-field relative border-b-2 border-[#adadad] my-7">
          <input
            type="text"
            id="lastName"
            name="lastName"
            placeholder=""
            class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800"
          />
          <span
            class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"
          ></span>
          <label
            class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500"
            >Last Name</label
          >
        </div>

        <div class="text-field relative border-b-2 border-[#adadad] my-7">
          <input
            type="email"
            id="email"
            name="email"
            placeholder=""
            class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800"
          />
          <span
            class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"
          ></span>
          <label
            class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500"
            >Email</label
          >
        </div>

        <div class="text-field relative border-b-2 border-[#adadad] my-7">
          <input
            type="password"
            id="password"
            name="password"
            placeholder=""
            class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800"
          />
          <span
            class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"
          ></span>
          <label
            class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500"
            >Password</label
          >
        </div>
        <div class="text-field relative border-b-2 border-[#adadad] my-7">
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder=""
            class="w-full h-10 text-base border-none bg-none outline-none px-1 text-gray-800"
          />
          <span
            class="before:content-[''] before:absolute before:top-10 before:left-0 before:w-0 before:h-[2px] before:bg-[#2691d9] before:transition-all before:duration-500"
          ></span>
          <label
            class="absolute top-1/2 left-[3px] text-[#adadad] -translate-y-1/2 text-base pointer-events-none transition-all duration-500"
            >Confirm Password</label
          >
        </div>

        <div class="relative my-7">
          <label
            for="dropDown-options"
            class="block text-sm font-medium text-gray-500 mb-2"
          >
            Select Role
          </label>

          <div class="relative border-b-2 border-[#adadad]">
            <select
              name="admin"
              id="dropDown-options"
              class="w-full h-10 text-base border-none bg-transparent outline-none px-1 text-gray-800 cursor-pointer appearance-none pr-8"
            >
              <option value="admin">Admin</option>

              <option value="admin">Admin</option>
              <!-- <option value="user">User</option>
            <option value="guest">Guest</option> -->
            </select>

            <div
              class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none text-gray-500"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                ></path>
              </svg>
            </div>

            <span
              class="absolute bottom-0 left-0 w-0 h-[2px] bg-[#2691d9] transition-all duration-500 peer-focus:w-full"
            ></span>
          </div>
        </div>

        <button
          type="submit"
          class="w-full h-[50px] bg-[#2691d9] text-[#e9f4fb] rounded-[20px] text-lg font-bold cursor-pointer outline-none border border-transparent hover:border-[#2691d9] transition-all duration-500"
        >
          Sign up
        </button>

        <div class="mt-8 text-center text-base text-[#666666]">
          Already a Member?
          <a
            href="./login.html"
            class="text-[#2691d9] no-underline hover:underline"
            >Login</a
          >
        </div>
      </form>
    </div>

    <script>
      const signupForm = document.getElementById("signupForm");

      signupForm.addEventListener("submit", (e) => {
        e.preventDefault();
        Signup(e);
        window.location.href = "./login.html";
      });

      function Signup(e) {
        alert("Submitted");

        const formData = new FormData(e.target);
        const signupData = Object.fromEntries(formData);

        localStorage.setItem("user", JSON.stringify(signupData));
        console.log(signupData);
      }
    </script>
  </body>
</html>
